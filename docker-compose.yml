services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bizagent}
      POSTGRES_USER: ${POSTGRES_USER:-bizagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports: ["5432:5432"]
    volumes:
      - ./pg-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d

  chroma:
    image: chromadb/chroma:latest
    ports: ["8001:8000"]
    volumes:
      - ./chroma-data:/chroma/chroma

  ai-engine:
    build: ./apps/ai-engine
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    ports: ["8000:8000"]
    depends_on: [postgres, chroma]
    volumes:
      # bge-m3(~2.3GB) 콜드로드 캐시. 볼륨 없으면 컨테이너 재생성마다 매번 재다운로드해서
      # 기동에 수 분씩 걸린다(이슈 #44의 기동 시 자동 인덱싱과 겹치면 더 체감됨).
      - hf-cache:/root/.cache/huggingface

  api-core:
    build: ./apps/api-core
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      AI_ENGINE_BASE_URL: http://ai-engine:8000
    ports: ["8080:8080"]
    depends_on: [postgres, ai-engine]

  web:
    build: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      API_BASE_URL_INTERNAL: http://api-core:8080
    ports: ["3000:3000"]
    depends_on: [api-core]

volumes:
  hf-cache:
