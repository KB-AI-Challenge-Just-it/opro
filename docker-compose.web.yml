# web 전용 compose 파일. 백엔드(docker-compose.yml)와 완전히 분리된 프로젝트라서
# `docker compose -f docker-compose.web.yml up -d --build`를 아무리 반복해도
# postgres/chroma/ai-engine/api-core는 절대 건드리지 않는다.
#
# 전제: 백엔드는 `docker compose up -d`로 이미 떠 있고 8080이 호스트에 publish돼 있어야 함.
# host.docker.internal은 Docker Desktop(Mac/Windows)에서 호스트에 publish된 포트를
# 가리키는 특수 DNS라 web 컨테이너가 별도 네트워크에 있어도 api-core에 닿는다.
services:
  web:
    build: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      API_BASE_URL_INTERNAL: http://host.docker.internal:8080
    ports: ["3000:3000"]
